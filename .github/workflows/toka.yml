name: Toka
on:
    workflow_dispatch
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: get code 
              uses: actions/checkout@v3
              
            - name: set node
              uses: actions/node@v3
              with:
                node-version: 14

            - name: install dependencies 
              run: npm install 
            
            - name: run tests
              run: npm test